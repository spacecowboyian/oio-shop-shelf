# Toyota MR2 (AW11) 1988 whole-vehicle Factory Service Manual.
# Source: Internet Archive item "1988-toyota-mr-2-repair-manual-toyota" (free, unrestricted).
# 1066 pp, text layer present. Covers 4A-GE + 4A-GZE. See README.md for scope/provenance.
# Chapter page ranges auto-detected from page running-headers (no embedded TOC) — verify
# at section seams during cleanup.

slug: toyota-mr2-aw11
title: "Toyota MR2 (AW11) 1988 Service Manual"

# Placement in the automotive taxonomy (manuals/taxonomy.yml). Keys must resolve there;
# CI blocks unknown ones. Drives the folder home + the generated README front matter.
taxonomy:
  make: toyota            # -> makes.toyota
  category: vehicle       # whole-vehicle manual; lives under manuals/toyota/vehicle/
  models: [mr2]           # keys under makes.toyota.models
  chassis: [AW11]         # generation/chassis codes (under makes.toyota.models.mr2.chassis)
  engines:                # engines this vehicle uses (keys under makes.toyota.engines)
    - 4a-ge
    - 4a-gze
  years: "1984-1989"      # AW11 generation span (this scan is the 1988 book)

source:
  type: url
  location: "https://github.com/spacecowboyian/oio-shop-shelf/releases/download/manuals-mr2-aw11/mr2-aw11.pdf"
  pages: 1066

rights: >
  Original manual (c) Toyota Motor Corporation. Sourced from the Internet Archive
  (item 1988-toyota-mr-2-repair-manual-toyota), free and unrestricted. Both the derived
  markdown transcription and the source PDF are committed here without a license from
  Toyota — a considered risk, consistent with the rest of this repo. See CONTRIBUTING.md.

ocr:
  language: eng
  force: false

render:
  dpi: 200


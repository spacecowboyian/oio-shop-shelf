# Reference implementation for oio-shop-shelf.
# Toyota 4A-F / 4A-GE engine service manual — the worked example the pipeline generalizes from.
# This manual was transcribed by hand (the original 16-subagent cleanup pass); the wiki/
# files here are that faithful transcription, ported from Brains. Source PDF is committed
# alongside this manifest (see rights + CONTRIBUTING.md) so an AI assistant reading the
# wiki can open it directly for diagrams/wiring charts.

slug: toyota-4a-fe-4a-ge
title: "Toyota 4A-F / 4A-GE Engine Service & Maintenance Manual"

# Placement in the automotive taxonomy (manuals/taxonomy.yml). Keys must resolve there;
# CI blocks unknown ones. Drives the folder home + the generated README front matter.
taxonomy:
  make: toyota          # -> makes.toyota
  category: engine      # engine | vehicle ; this manual lives under manuals/toyota/engine/
  engines:              # engine families this manual covers (keys under makes.toyota.engines)
    - 4a-f
    - 4a-ge

source:
  type: local
  location: "Toyota-4A-F-4A-GE-engine-manual-OCR.pdf"
  pages: 219

rights: >
  Original manual © Toyota Motor Corporation. Both the derived markdown transcription
  and the source PDF are committed to this repo without a license from Toyota — a
  considered risk, not an oversight. See CONTRIBUTING.md.

ocr:
  language: eng
  force: false

render:
  dpi: 200

# 1-based inclusive source-PDF page ranges (from wiki/00-index.md).
chapters:
  - file: "01-preparation.md"

# NOTE: this manual ships hand-curated index files (00-index.md, 09-torque-specs.md,
# 10-needs-review.md, 11a..11d-alphabetical-index.md) rather than the auto-generated
# scheme from 05_build_indexes.py. They are richer (multi-file alphabetical index,
# ~970 entries; per-value torque backlinks) than the generator would produce, so they
# are kept as-is. 05_build_indexes.py targets NEW manuals that lack curated indexes.

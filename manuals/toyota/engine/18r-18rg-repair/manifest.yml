# Toyota 18R / 18R-C / 18R-G engine repair manual (© Toyota Motor Corporation, 1983).
# Source is 13 per-chapter scan PDFs from a public Google Drive folder, merged in
# section order into a single source.pdf (335 pages). See README.md for provenance.

slug: toyota-18r-18rg-repair
title: "Toyota 18R / 18R-C / 18R-G Engine Repair Manual"

# Placement in the automotive taxonomy (manuals/taxonomy.yml). Keys must resolve there;
# CI blocks unknown ones. Drives the folder home + the generated README front matter.
taxonomy:
  make: toyota            # -> makes.toyota
  category: engine        # engine-family manual; lives under manuals/toyota/engine/
  engines:                # engine families this manual covers (keys under makes.toyota.engines)
    - 18r
    - 18r-c
    - 18r-g

source:
  type: local
  location: "source.pdf"
  pages: 335

rights: >
  Original manual © Toyota Motor Corporation (1983). Both the derived markdown and the
  merged source PDF are committed without a license from Toyota — a considered risk,
  not an oversight. See CONTRIBUTING.md.

ocr:
  language: eng
  force: false

render:
  dpi: 200

# 1-based inclusive source-PDF page ranges = cumulative page offsets of the 13 merged
# chapter scans. The manual's own printed page numbers are per-section (e.g. "5-1").
chapters:
  - file: "00-front.md"
    section_code: "00"
    title: "Front Matter — Foreword & Section Index"
    page_start: 1
    page_end: 5
  - file: "01-general.md"
    section_code: "1"
    title: "General — Repair Instructions, Abbreviations, Symbols"
    page_start: 6
    page_end: 9

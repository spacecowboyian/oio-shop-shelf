# Manifest for a single manual. Copy this folder to its taxonomy home:
#   manuals/<make>/<vehicle|engine>/<unit>/     e.g. manuals/toyota/vehicle/mr2-aw11/
#                                                    manuals/toyota/engine/4a-fe-repair/
# `make` and `<vehicle|engine>` come from the `taxonomy:` block below; `<unit>` is a short
# folder name (the make is already implied by the parent). The slug stays the globally-unique
# id and need not equal the folder name. See manuals/taxonomy.md for the whole convention.
# Every field marked (required) must be filled before the pipeline scripts will run.

slug: example-make-model            # (required) globally-unique folder-safe id (e.g. toyota-mr2-aw11)
title: "Example Make/Model Service Manual"   # (required) human title for the index

# (required) Placement in the automotive taxonomy — manuals/taxonomy.yml.
# Every key below MUST resolve to an entry in taxonomy.yml or CI fails
# (scripts/validate_manifests.py). Add the make/model/engine THERE first if it's new.
# This block also drives the generated README front matter (scripts/10_write_frontmatter.py),
# which is how an agent finds the right manual for a given car.
#
# category: engine   -> whole-engine-family manual (spans many cars). Declare `engines:`.
# category: vehicle  -> whole-vehicle / chassis manual. Declare `models:` (+ `chassis:`,
#                       and `engines:` the vehicle uses). Example (a Toyota MR2, AW11):
#
# taxonomy:
#   make: toyota
#   category: vehicle
#   models: [mr2]              # keys under makes.toyota.models
#   chassis: [aw11]           # generation/chassis codes (under the model)
#   engines: [4a-ge, 4a-gze]  # engines the vehicle uses (keys under makes.toyota.engines)
#   years: "1984-1989"        # optional; free-text span this manual's chassis covers
#
# The engine-manual form (what the two committed Toyota manuals use):
taxonomy:
  make: example-make          # (required) key under makes: in taxonomy.yml
  category: engine            # (required) engine | vehicle
  engines:                    # (required for engine) keys under makes.<make>.engines
    - example-engine
  # years: "1990-1999"        # optional free-text coverage span

# (required) Pointer to the SOURCE PDF. Default posture: commit it into this folder
# (type: local, a filename relative to this manifest) so an AI assistant reading the
# wiki can open it for diagrams/wiring charts. See CONTRIBUTING.md on copyright risk.
source:
  type: local                       # local | url
  location: "your-source.pdf"
  pages: 219                        # total page count of the source PDF

# (required) Rights / license note for THIS manual's content (not the tooling).
# Be honest about provenance — name the copyright holder and note that no license was
# sought, if that's the case.
rights: >
  Copyright of the original manual belongs to its publisher. No license was sought;
  committing it here is a considered risk, taken deliberately. See CONTRIBUTING.md.

# OCR settings for 01_prepare_pdf.py
ocr:
  language: eng                     # tesseract language code(s), e.g. "eng" or "eng+deu"
  force: false                      # true = re-OCR even if a text layer exists

# Render settings for 02_render_pages.py
render:
  dpi: 200

# (required) Chapter map: each entry becomes one raw draft and one wiki/*.md file.
# page_start/page_end are 1-based, inclusive, in SOURCE-PDF page numbers.
# Split a large chapter into multiple entries (e.g. 04a, 04b) — the index builder
# groups them by leading number.
# Optional per-chapter `section_code` (e.g. "EM", "FI") — the manual's own section code.
# If set, scripts/check_page_continuity.py keys its missing-page detection off it instead
# of guessing; also handy documentation.
chapters:
  - file: "01-general-information.md"
    section_code: "IN"
    title: "General Information"
    page_start: 1
    page_end: 12
  - file: "02-maintenance.md"
    section_code: "MA"
    title: "Maintenance"
    page_start: 13
    page_end: 30
  # - file: "04a-engine-mechanical.md"
  #   title: "Engine Mechanical (Part A)"
  #   page_start: 45
  #   page_end: 70

# Files generated by 05_build_indexes.py (do not hand-edit; listed here for reference):
#   00-index.md, 09-quick-reference.md, 10-needs-review.md, 11a-..-alphabetical-index.md
